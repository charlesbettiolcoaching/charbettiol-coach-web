name: argus-audit

# Runs daily at 21:00 UTC (= 7am AEST in winter / 8am AEDT in summer).
# Surfaces TS errors, lint issues, leaked secrets, and outdated deps into
# a Supabase audit_reports row + a Resend email + Mission Control inbox.
#
# Required repo secrets:
#   SUPABASE_URL                 — e.g. https://<project>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    — service_role key (CI write access)
#   RESEND_API_KEY               — Resend API key
#   AUDIT_EMAIL_TO               — inbox that receives the morning report

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run Argus audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AUDIT_EMAIL_TO: ${{ secrets.AUDIT_EMAIL_TO }}
          REPO_NAME: web-dashboard
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/argus-audit.mjs
